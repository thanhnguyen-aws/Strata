name: CBMC

on:
  workflow_call:

jobs:
  cbmc_test:
    name: Run CBMC tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install cvc5
        shell: bash
        run: |
              ARCH=$(uname -m)
              if [ "$ARCH" = "x86_64" ]; then
                ARCH_NAME="x86_64"
              elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                ARCH_NAME="arm64"
              else
                echo "Unsupported architecture: $ARCH"
                exit 1
              fi
              wget -q https://github.com/cvc5/cvc5/releases/download/cvc5-1.2.1/cvc5-Linux-${ARCH_NAME}-static.zip
              unzip -q cvc5-Linux-${ARCH_NAME}-static.zip
              chmod +x cvc5-Linux-${ARCH_NAME}-static/bin/cvc5
              echo "$GITHUB_WORKSPACE/cvc5-Linux-${ARCH_NAME}-static/bin/" >> $GITHUB_PATH
      - name: Install z3
        shell: bash
        run: |
              ARCH=$(uname -m)
              if [ "$ARCH" = "x86_64" ]; then
                wget -q https://github.com/Z3Prover/z3/releases/download/z3-4.15.2/z3-4.15.2-x64-glibc-2.39.zip
                ARCHIVE_NAME="z3-4.15.2-x64-glibc-2.39"
              elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                wget -q https://github.com/Z3Prover/z3/releases/download/z3-4.15.2/z3-4.15.2-arm64-glibc-2.34.zip
                ARCHIVE_NAME="z3-4.15.2-arm64-glibc-2.34"
              else
                echo "Unsupported architecture: $ARCH"
                exit 1
              fi
              unzip -q "${ARCHIVE_NAME}.zip"
              chmod +x "${ARCHIVE_NAME}/bin/z3"
              echo "$GITHUB_WORKSPACE/${ARCHIVE_NAME}/bin/" >> $GITHUB_PATH
      - name: Prepare ccache
        uses: actions/cache@v5
        with:
          save-always: true
          path: .ccache
          key: cbmc-${{ runner.os }}-${{ runner.arch }}-cbmc-${{ github.sha }}
          restore-keys: |
            cbmc-${{ runner.os }}-${{ runner.arch }}-cbmc
      - name: Build CBMC from source (with string support patch)
        shell: bash
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y cmake ninja-build flex bison ccache
          git clone --depth 1 --branch cbmc-6.8.0 https://github.com/diffblue/cbmc.git cbmc-src
          cd cbmc-src
          git apply "$GITHUB_WORKSPACE/StrataTest/Languages/Python/cbmc-string-support.patch"
          git apply "$GITHUB_WORKSPACE/StrataTest/Languages/Laurel/cbmc-bounds-check.patch"
          git apply "$GITHUB_WORKSPACE/StrataTest/Backends/CBMC/cbmc-regex-support.patch"
          git apply "$GITHUB_WORKSPACE/StrataTest/Backends/CBMC/cbmc-quantifier-simplify.patch"
          export CCACHE_BASEDIR=$PWD
          export CCACHE_DIR=$GITHUB_WORKSPACE/.ccache
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWITH_JBMC=OFF
          ccache -z --max-size=500M
          ninja -C build cbmc symtab2gb goto-cc goto-instrument
          ccache -s
          echo "$GITHUB_WORKSPACE/cbmc-src/build/bin/" >> $GITHUB_PATH
      - name: Restore lake cache
        # The cache is safe to use here because we just saved it for this exact SHA
        # in the build_and_test_lean job from ci.yml
        # https://github.com/strata-org/Strata/issues/952
        uses: actions/cache/restore@v5
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ hashFiles('**/*.st') }}-${{ github.sha }}
          fail-on-cache-miss: true
      - name: Build Strata
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          use-github-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: Run legacy CBMC test (C_Simp)
        shell: bash
        run: |
          lake exe StrataToCBMC Strata/Backends/CBMC/tests/simpleTest.csimp.st > symtab.json
          symtab2gb symtab.json --out full.goto
          goto-instrument --enforce-contract simpleTest full.goto full_checking.goto
          OUTPUT=$(cbmc full_checking.goto --function simpleTest --trace)
          echo "$OUTPUT"
          [[ "$OUTPUT" == *"VERIFICATION SUCCESSFUL"* ]]
      - name: Run Python CBMC pipeline tests
        shell: bash
        run: |
          pip install ./Tools/Python
          ./StrataTest/Languages/Python/run_py_cbmc_tests.sh
      - name: Run property summary tests
        shell: bash
        run: |
          ./StrataTest/Backends/CBMC/GOTO/test_property_summary_e2e.sh
      - name: Run Laurel CBMC pipeline tests
        shell: bash
        run: |
          ./StrataTest/Languages/Laurel/run_laurel_cbmc_tests.sh
