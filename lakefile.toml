name = "Strata"
version = "0.1.0"
defaultTargets = ["Strata", "strata", "StrataMain", "StrataToCBMC", "StrataCoreToGoto"]
testDriver = "StrataTestMain"
lintDriver = "CheckImports"

[[require]]
name = "plausible"
git = "https://github.com/leanprover-community/plausible.git"
rev = "bump_to_v4.29.0-rc8"

[[lean_lib]]
name = "Strata"

[[lean_exe]]
name = "strata"
root = "StrataMain"

[[lean_lib]]
name = "StrataExamples"
globs = ["Examples.Lean.+"]

[[lean_lib]]
name = "StrataTest"
globs = ["StrataTest.+"]

[[lean_exe]]
name = "StrataTestMain"
root = "Scripts.StrataTestMain"
# `Strata` is listed explicitly because the driver spawns `lean` on files
# under `StrataTestExtra/` (which is not a `lean_lib`). Those files import
# modules from the `Strata` library that are not in `StrataTest`'s transitive
# closure (e.g., `Strata.DDM.Integration.Java`), so without this the oleans
# would be missing when running `lake test` from a clean `.lake`.
needs = ["Strata", "StrataTest"]

[[lean_exe]]
name = "StrataToCBMC"

[[lean_exe]]
name = "StrataCoreToGoto"

[[lean_exe]]
name = "CheckImports"
root = "Scripts.CheckImports"

[[lean_exe]]
name = "ImportStats"
root = "Scripts.ImportStats"

[[lean_exe]]
name = "DiffTestCore"
